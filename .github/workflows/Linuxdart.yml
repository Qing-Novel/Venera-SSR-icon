name: Build Linux
on:
  push:
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev
          
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
          
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libwebkit2gtk-4.1-dev
        
      - name: Enable Linux support
        run: flutter config --enable-linux-desktop
        
      - name: Run tests
        run: flutter test test/anime4k_test.dart

      - name: Build Linux
        run: flutter build linux --release

      # 新增打包步骤（原先裸上传 bundle/ 目录）
      - name: Package Linux Build
        run: |
          VERSION=$(grep "^version:" pubspec.yaml | head -1 | sed 's/version: //' | cut -d+ -f1)
          ZIP_NAME="Venera-Linux-v$VERSION.zip"
          cd build/linux/x64/release
          zip -r "$ZIP_NAME" bundle/
        
      - name: Upload Linux Build
        uses: actions/upload-artifact@v4
        with:
          name: app-release-linux
          path: build/linux/x64/release/*.zip
