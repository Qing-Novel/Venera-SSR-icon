name: Publish APK to Release

# 自动发布：当 feature/colorization 上的 "Build Android APK" 构建成功完成后触发，
# 直接取触发本次事件的构建产物（run-id = github.event.workflow_run.id），
# 覆盖上传到最新 release v2.1.2（仅替换同名 Android APK，不改动介绍/不新增版本号）。
on:
  workflow_run:
    workflows: ["Build Android APK"]
    branches: [feature/colorization]
    types: [completed]

permissions:
  contents: write
  actions: read

jobs:
  publish:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact from the triggering run
        uses: actions/download-artifact@v4
        with:
          name: app-release-apk
          run-id: ${{ github.event.workflow_run.id }}
          path: apks
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Locate APK files
        id: apks
        run: |
          echo "Downloaded contents:"
          find apks -type f
          mapfile -t FILES < <(find apks -name '*.apk' -type f)
          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "::error::No APK files found in artifact"
            exit 1
          fi
          echo "Found ${#FILES[@]} APK(s):"
          printf '  %s\n' "${FILES[@]}"

      - name: Upload to latest release v2.1.2 (overwrite Android APKs)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mapfile -t FILES < <(find apks -name '*.apk' -type f)
          gh release upload 2.1.2 "${FILES[@]}" --clobber --repo Kiastr/Venera-SSR
          echo "Done. Current release assets:"
          gh release view 2.1.2 --repo Kiastr/Venera-SSR --json assets -q '.assets[].name'
