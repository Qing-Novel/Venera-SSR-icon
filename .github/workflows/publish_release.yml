name: Publish APK to Release

# 自动发布：当 feature/colorization 上的 "Build Android APK" 构建成功完成后触发，
# 直接取触发本次事件的构建产物（run-id = github.event.workflow_run.id），
# 创建一个【新 release】（默认 2.1.3），其介绍继承上一个 release（2.1.2）的介绍文本，
# 并在末尾追加版本号；仅上传本次 Action 编译的 Android APK。
# 事件驱动（workflow_run），不轮询 GitHub API。
on:
  workflow_run:
    workflows: ["Build Android APK"]
    branches: [feature/colorization]
    types: [completed]

permissions:
  contents: write
  actions: read

env:
  NEW_TAG: "2.1.3"
  PREV_TAG: "2.1.2"

jobs:
  publish:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact from the triggering run
        uses: actions/download-artifact@v4
        with:
          name: app-release-apk
          run-id: ${{ github.event.workflow_run.id }}
          path: apks
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Locate APK files
        id: apks
        run: |
          echo "Downloaded contents:"
          find apks -type f
          mapfile -t FILES < <(find apks -name '*.apk' -type f)
          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "::error::No APK files found in artifact"
            exit 1
          fi
          echo "Found ${#FILES[@]} APK(s):"
          printf '  %s\n' "${FILES[@]}"

      - name: Build release notes (inherit previous release description + version)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV_BODY=$(gh release view "$PREV_TAG" --repo Kiastr/Venera-SSR --json body -q .body)
          if echo "$PREV_BODY" | grep -q "$NEW_TAG"; then
            echo "Version $NEW_TAG already present in inherited description; using as-is."
            printf '%s\n' "$PREV_BODY" > /tmp/new_body.md
          else
            {
              printf '%s\n' "$PREV_BODY"
              echo ""
              echo "---"
              echo ""
              echo "### Version $NEW_TAG"
            } > /tmp/new_body.md
          fi
          echo "--- new release notes preview ---"
          cat /tmp/new_body.md

      - name: Create new release 2.1.3 with Action-built APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mapfile -t FILES < <(find apks -name '*.apk' -type f)
          gh release create "$NEW_TAG" "${FILES[@]}" \
            --repo Kiastr/Venera-SSR \
            --title "$NEW_TAG" \
            --notes-file /tmp/new_body.md \
            --target "${{ github.event.workflow_run.head_sha }}"
          echo "Done. New release $NEW_TAG assets:"
          gh release view "$NEW_TAG" --repo Kiastr/Venera-SSR --json assets -q '.assets[].name'
